version: '3.8'

services:
  caddy-proxy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - ai-devops-network

  node-ingestion:
    image: yourdockerhub/node-gateway:latest
    environment:
      - CELERY_BROKER_URL=redis://your-dedicated-redis-broker-ip:6379/0
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
    depends_on:
      - caddy-proxy
    networks:
      - ai-devops-network

  django-dashboard:
    image: yourdockerhub/django-app:latest
    environment:
      - DATABASE_URL=postgres://admin:pwd@your-managed-db-ip:5432/db
      - CELERY_BROKER_URL=redis://your-dedicated-redis-broker-ip:6379/0
      - CELERY_RESULT_BACKEND=redis://your-dedicated-redis-broker-ip:6379/0
      - GITHUB_APP_IDENTIFIER=${GITHUB_APP_IDENTIFIER}
      - GITHUB_APP_PRIVATE_KEY_PATH=/app/certs/github_app.pem
      - SLACK_ALERTS_WEBHOOK_URL=${SLACK_ALERTS_WEBHOOK_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SIGNING_SECRET=${STRIPE_WEBHOOK_SIGNING_SECRET}
      - STRIPE_ENTERPRISE_PRICE_ID=${STRIPE_ENTERPRISE_PRICE_ID}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - FERNET_KEY=${FERNET_KEY}
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      - caddy-proxy
    networks:
      - ai-devops-network

networks:
  ai-devops-network:
    driver: bridge

volumes:
  caddy_data:
